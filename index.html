<script type="module">
  // Import Firebase base
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-analytics.js";

  // Import Firestore (database)
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    getDocs,
    collection,
    updateDoc,
    deleteDoc,
    query,
    where,
    addDoc
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  // Import Authentication (login)
  import {
    getAuth,
    signInWithEmailAndPassword,
    signOut
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

  // --- CONFIGURAZIONE FIREBASE (la tua) ---
  const firebaseConfig = {
    apiKey: "AIzaSyA60dEDUE8kQda_hbGsCclNx5oBKzhUl5Y",
    authDomain: "registro-c5841.firebaseapp.com",
    projectId: "registro-c5841",
    storageBucket: "registro-c5841.firebasestorage.app",
    messagingSenderId: "1042215508879",
    appId: "1:1042215508879:web:796c707f9856a554e809fa",
    measurementId: "G-CF38Z5Q3BM"
  };

  // --- INIZIALIZZAZIONE ---
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);

  // Firestore
  const db = getFirestore(app);

  // Auth
  const auth = getAuth(app);

  // --- FUNZIONI FIREBASE ---
  
  // Carica tutti i dati da Firebase
  window.loadAllData = async function() {
    try {
    // Carica gruppi
            const gruppiSnap = await getDoc(doc(db, "registro", "gruppi"));
            if (gruppiSnap.exists()) {
                window.gruppi = gruppiSnap.data().data || {};
      }
      
      // Carica presenze
      const presenzeSnap = await getDoc(doc(db, "registro", "presenze"));
      if (presenzeSnap.exists()) {
        window.presenze = presenzeSnap.data().data || {};
      }
      
    // Carica giudizi
            const giudiziSnap = await getDoc(doc(db, "registro", "giudizi"));
            if (giudiziSnap.exists()) {
                window.giudizi = giudiziSnap.data().data || {};
      }
      
      // Carica note
      const noteSnap = await getDoc(doc(db, "registro", "note"));
      if (noteSnap.exists()) {
        window.note = noteSnap.data().data || {};
      }
      
      // Carica utenti
      const usersSnap = await getDoc(doc(db, "registro", "users"));
      if (usersSnap.exists()) {
        window.users = usersSnap.data().data || {};
      }
      
      // Assicurati che l'admin esista
      if (!window.users.admin) {
        window.users.admin = {password: "admin", role: "admin", gruppi: "ALL"};
        await saveAllToFirebase();
      }
      
      console.log("Dati caricati da Firebase");
    } catch (error) {
      console.error("Errore caricamento dati:", error);
    }
  };
  
  // Salva tutti i dati su Firebase
  window.saveAllToFirebase = async function() {
    try {
      await setDoc(doc(db, "registro", "gruppi"), { data: window.gruppi });
      await setDoc(doc(db, "registro", "presenze"), { data: window.presenze });
      await setDoc(doc(db, "registro", "giudizi"), { data: window.giudizi });
      await setDoc(doc(db, "registro", "note"), { data: window.note });
      await setDoc(doc(db, "registro", "users"), { data: window.users });
      console.log("Dati salvati su Firebase");
    } catch (error) {
      console.error("Errore salvataggio dati:", error);
    }
  };
</script>

<body>

    <div id="loginPage">
        <div class="login-card">
            <h2>Login</h2>
            <input id="loginUser" placeholder="Username" onkeypress="if(event.key==='Enter'){event.preventDefault(); login(); return false;}">
            <input id="loginPass" type="password" placeholder="Password" onkeypress="if(event.key==='Enter'){event.preventDefault(); login(); return false;}">
            <button onclick="login(); return false;">Entra</button>
        </div>
    </div>

    <div id="app" class="app-wrapper" style="display: none;">
        <div class="sidebar">
            <h2 id="sidebarTitle">Registro</h2>
            <div id="menuDaily" class="menu-item" onclick="showPage('dailyPage')">Presenze</div>
            <div id="menuGruppi" class="menu-item" onclick="showPage('gruppiPage')">Gruppi</div>
            <div id="menuStudents" class="menu-item" onclick="showPage('studentPage')">Studenti</div>
            <div id="menuTeachers" class="menu-item" onclick="showPage('teachersPage')">Insegnanti</div>
            <div id="menuGrades" class="menu-item" onclick="showPage('gradesPage')">Giudizi</div>
            <div id="menuNotes" class="menu-item" onclick="showPage('notesPage')">Note</div>
            <div style="margin-top:auto" class="menu-item menu-item-danger" onclick="logout()">Logout</div>
        </div>

        <div class="main">

            <div id="dailyPage" class="card">
                <h2>Presenze</h2>
                <div class="flex date-controls">
                    <button onclick="changeDay(-1)">◀</button>
                    <input id="date" type="date" onchange="renderDailyPage()" class="half">
                    <button onclick="changeDay(1)">▶</button>
                </div>
                <button onclick="showHistoryPage()" style="margin-bottom: 15px;">📊 Storico Presenze</button>
                <div id="dailyContainer"></div>
            </div>

            <div id="historyPage" class="card hidden">
                <h2>Storico Presenze - Calendario</h2>
                <button onclick="showPage('dailyPage')" style="margin-bottom: 15px;">← Torna a Presenze</button>
                <div class="flex date-controls" style="margin-bottom: 15px;">
                    <button onclick="changeHistoryMonth(-1)">◀ Mese Prec.</button>
                    <input id="historyMonth" type="month" onchange="renderHistory()" class="half">
                    <button onclick="changeHistoryMonth(1)">Mese Succ. ▶</button>
                </div>
                <div id="historyContainer"></div>
            </div>

            <div id="gruppiPage" class="card hidden">
                <h2>Gruppi</h2>
                <input id="newGruppoName" placeholder="Nome gruppo">
                <button onclick="addGruppo()">Aggiungi</button>
                <h3>Lista</h3>
                <div id="gruppoList"></div>
            </div>

            <div id="studentPage" class="card hidden">
                <h2>Studenti</h2>
                <input id="studentName" placeholder="Nome studente">
                <select id="studentGruppo"></select>
                <button onclick="addStudent()">Aggiungi</button>
                <h3>Lista</h3>
                <div id="studentList"></div>
            </div>

            <div id="teachersPage" class="card hidden">
                <h2>Insegnanti</h2>
                <input id="teacherUser" placeholder="Username">
                <input id="teacherPass" type="password" placeholder="Password">
                <p>Gruppi:</p>
                <div id="teacherGruppi"></div>
                <button onclick="addTeacher()">Crea</button>
                <h3>Lista</h3>
                <div id="teacherList"></div>
            </div>

            <div id="gradesPage" class="card hidden">
                <h2>Giudizi</h2>
                <select id="gradeStudentSelect" onchange="updateGradeInputs(); renderGrades();"></select>
                <div class="flex">
                    <select id="gradeValue" class="half">
                        <option value="">Seleziona giudizio</option>
                        <option value="A0">A0</option>
                        <option value="A0+">A0+</option>
                        <option value="A1-">A1-</option>
                        <option value="A1">A1</option>
                        <option value="A1+">A1+</option>

                    <input id="gradeDate" type="date" class="half">
                </div>
                <input id="gradeType" placeholder="Tipologia">
                <button onclick="addGrade()">Aggiungi</button>
                <h3>Elenco</h3>
                <div id="gradeList"></div>
            </div>

            <div id="notesPage" class="card hidden">
                <h2>Note</h2>
                <select id="noteStudentSelect" onchange="updateNoteInputs(); renderNotes();"></select>
                <textarea id="noteText" placeholder="Nota"></textarea>
                <input id="noteDate" type="date">
                <button onclick="addNote()">Aggiungi</button>
                <h3>Elenco</h3>
                <div id="noteList"></div>
            </div>

        </div>

    <script>
        // Data initialization - verranno caricati da Firebase
        // Usa le variabili window caricate da Firebase
        window.gruppi = window.gruppi || {};
        window.presenze = window.presenze || {};
        window.giudizi = window.giudizi || {};
        window.note = window.note || {};
        window.users = window.users || {};
        
        let gruppi = window.gruppi;
        let presenze = window.presenze;
        let giudizi = window.giudizi;
        let note = window.note;
        let users = window.users;

        let currentUser = null;

        // Utility functions
        function saveAll() {
            // Assicurati che window abbia i dati aggiornati
            window.gruppi = gruppi;
            window.presenze = presenze;
            window.giudizi = giudizi;
            window.note = note;
            window.users = users;
            // Salva su Firebase
            saveAllToFirebase();
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Login/Logout
        async function login() {
            let u = document.getElementById('loginUser').value.trim();
            let p = document.getElementById('loginPass').value.trim();
            
            if (!u || !p) {
                alert('Inserisci username e password');
                return;
            }
            
            // Mostra messaggio di caricamento
            const loginBtn = document.querySelector('#loginPage button');
            const originalText = loginBtn.textContent;
            loginBtn.textContent = 'Caricamento dati...';
            loginBtn.disabled = true;
            
            try {
                // Carica i dati da Firebase prima di verificare le credenziali
                await loadAllData();
                
                // Sincronizza le variabili locali con i dati caricati
                gruppi = window.gruppi;
                presenze = window.presenze;
                giudizi = window.giudizi;
                note = window.note;
                users = window.users;
                
                if (!users[u]) {
                    alert("Utente non trovato");
                    loginBtn.textContent = originalText;
                    loginBtn.disabled = false;
                    return;
                }
                
                if (users[u].password !== p) {
                    alert("Password errata");
                    loginBtn.textContent = originalText;
                    loginBtn.disabled = false;
                    return;
                }
                
                currentUser = {username: u, ...users[u]};
                
                document.getElementById('loginPage').style.display = "none";
                document.getElementById('app').style.display = "flex";
                document.getElementById('sidebarTitle').textContent = "Registro (" + u + ")";
                
                initializeDates();
                setupRoleUI();
                showPage("dailyPage");
                
                // Ripristina il pulsante
                loginBtn.textContent = originalText;
                loginBtn.disabled = false;
            } catch (error) {
                console.error("Errore durante il login:", error);
                alert("Errore durante il caricamento dei dati. Riprova.");
                loginBtn.textContent = originalText;
                loginBtn.disabled = false;
            }
            
            return false;
        }

        function logout() {
            currentUser = null;
            document.getElementById('app').style.display = "none";
            document.getElementById('loginPage').style.display = "flex";
        }

        function setupRoleUI() {
            let isAdmin = currentUser.role === "admin";
            document.getElementById('menuGruppi').style.display = isAdmin ? "block" : "none";
            document.getElementById('menuStudents').style.display = isAdmin ? "block" : "none";
            document.getElementById('menuTeachers').style.display = isAdmin ? "block" : "none";
        }

        function showPage(id) {
            console.log('showPage called with id:', id);
            try {
                document.querySelectorAll(".card").forEach(e => e.classList.add("hidden"));
                console.log('All cards hidden');
                
                let pageElement = document.getElementById(id);
                if (!pageElement) {
                    console.error('Page element not found:', id);
                    return;
                }
                pageElement.classList.remove("hidden");
                console.log('Page shown:', id);
                
                if (id === "dailyPage") renderDailyPage();
                if (id === "gruppiPage") renderGruppiList();
                if (id === "studentPage") renderStudentList();
                if (id === "teachersPage") renderTeacherPage();
                if (id === "gradesPage") renderGradeSelectors();
                if (id === "notesPage") renderNoteSelectors();
                console.log('Page render function called for:', id);
            } catch(error) {
                console.error('Error in showPage:', error);
            }
        }

        function getVisibleGruppi() {
            return gruppi;
        }

        function getEditableGruppi() {
            if (currentUser.role === "admin" || currentUser.gruppi === "ALL") {
                return gruppi;
            }
            if (!Array.isArray(currentUser.gruppi)) {
                return {};
            }
            let editable = {};
            currentUser.gruppi.forEach(c => {
                if (gruppi[c]) editable[c] = gruppi[c];
            });
            return editable;
        }

        function canEditStudent(studentName) {
            if (currentUser.role === "admin") return true;
            if (currentUser.gruppi === "ALL") return true;
            
            if (!Array.isArray(currentUser.gruppi)) return false;
            
            for (const c in gruppi) {
                if (gruppi[c].includes(studentName) && currentUser.gruppi.includes(c)) {
                    return true;
                }
            }
            return false;
        }

        function getStudentGruppo(studentName) {
            for (const c in gruppi) {
                if (gruppi[c].includes(studentName)) {
                    return c;
                }
            }
            return "";
        }

        // Daily attendance
        function changeDay(offset) {
            let dateEl = document.getElementById('date');
            let d = new Date(dateEl.value || new Date());
            d.setDate(d.getDate() + offset);
            dateEl.value = d.toISOString().split("T")[0];
            renderDailyPage();
        }

        function renderDailyPage() {
            console.log('renderDailyPage called');
            try {
                let dailyContainer = document.getElementById('dailyContainer');
                if (!dailyContainer) {
                    console.error('dailyContainer not found');
                    return;
                }
                
                dailyContainer.innerHTML = "";
                let dateEl = document.getElementById('date');
                if (!dateEl || !dateEl.value) {
                    console.error('date element not found or has no value');
                    return;
                }
                
                let dt = dateEl.value;
                console.log('Date value:', dt);
                
                let vis = getVisibleGruppi();
                console.log('Visible groups:', vis);
                
                for (const c in vis) {
                    let block = document.createElement("div");
                    block.className = "class-block";
                    block.innerHTML = "<h3>Gruppo " + escapeHtml(c) + "</h3>";
                    
                    vis[c].forEach(s => {
                        let row = document.createElement("div");
                        row.className = "row";
                        
                        let select = document.createElement("select");
                        ["", "Presente", "Assente Giustificato", "Assente Ingiustificato"].forEach(v => {
                            let option = document.createElement("option");
                            option.value = v;
                            option.textContent = v || "—";
                            select.appendChild(option);
                        });
                        
                        let savedData = presenze[c]?.[s]?.[dt];
                        if (savedData) {
                            if (typeof savedData === 'string') {
                                select.value = savedData;
                            } else {
                                select.value = savedData.valore || "";
                            }
                        }
                        
                        let canEdit = false;
                        if (currentUser.role === "admin" || currentUser.gruppi === "ALL") {
                            canEdit = true;
                        } else if (Array.isArray(currentUser.gruppi) && currentUser.gruppi.includes(c)) {
                            canEdit = true;
                        }
                        
                        if (!canEdit) {
                            select.disabled = true;
                        }
                        
                        select.onchange = () => {
                            if (!canEdit) return;
                            presenze[c] ??= {};
                            presenze[c][s] ??= {};
                            
                            if (select.value === "" || select.value === null) {
                                // Rimuovi completamente i dati quando vuoto
                                delete presenze[c][s][dt];
                            } else {
                                presenze[c][s][dt] = {
                                    valore: select.value,
                                    insertedBy: currentUser.username
                                };
                            }
                            saveAll();
                            renderDailyPage();
                        };
                        
                        let displayText = escapeHtml(s);
                        if (savedData && savedData.insertedBy) {
                            displayText += " <span style='font-size:11px;color:#888'>(" + escapeHtml(savedData.insertedBy) + ")</span>";
                        }
                        
                        row.innerHTML = "<div>" + displayText + "</div>";
                        row.appendChild(select);
                        block.appendChild(row);
                    });
                    
                    dailyContainer.appendChild(block);
                }
                console.log('renderDailyPage completed successfully');
            } catch(error) {
                console.error('Error in renderDailyPage:', error);
            }
        }

        // Groups management
        function addGruppo() {
            let newGruppoNameEl = document.getElementById('newGruppoName');
            let n = newGruppoNameEl.value.trim();
            if (!n) return;
            if (!gruppi[n]) {
                gruppi[n] = [];
                newGruppoNameEl.value = "";
                saveAll();
                renderGruppiList();
                renderStudentList();
                renderTeacherPage();
            }
        }

        function renderGruppiList() {
            let gruppoList = document.getElementById('gruppoList');
            gruppoList.innerHTML = "";
            for (const c in gruppi) {
                let div = document.createElement("div");
                div.className = "class-block";
                div.innerHTML = `<div class="row"><div>${escapeHtml(c)}</div></div>`;
                
                let btn = document.createElement("button");
                btn.className = "delete-btn";
                btn.textContent = "Elimina";
                btn.onclick = () => deleteGruppo(c);
                div.querySelector(".row").appendChild(btn);
                
                gruppoList.appendChild(div);
            }
            updateStudentGruppoSelect();
        }

        function deleteGruppo(c) {
            delete gruppi[c];
            saveAll();
            renderGruppiList();
            renderStudentList();
            renderTeacherPage();
        }

        function updateStudentGruppoSelect() {
            let studentGruppo = document.getElementById('studentGruppo');
            studentGruppo.innerHTML = "";
            for (const c in gruppi) {
                let option = document.createElement("option");
                option.textContent = c;
                studentGruppo.appendChild(option);
            }
        }

        // Students management
        function addStudent() {
            let studentNameEl = document.getElementById('studentName');
            let n = studentNameEl.value.trim();
            let c = document.getElementById('studentGruppo').value;
            if (!n) return;
            gruppi[c].push(n);
            studentNameEl.value = "";
            saveAll();
            renderStudentList();
        }

        function renderStudentList() {
            let studentList = document.getElementById('studentList');
            studentList.innerHTML = "";
            for (const c in gruppi) {
                let block = document.createElement("div");
                block.className = "class-block";
                block.innerHTML = "<h3>Gruppo " + escapeHtml(c) + "</h3>";
                
                gruppi[c].forEach((s, i) => {
                    let row = document.createElement("div");
                    row.className = "row";
                    row.innerHTML = "<div>" + escapeHtml(s) + "</div>";
                    
                    let btn = document.createElement("button");
                    btn.className = "delete-btn";
                    btn.textContent = "Elimina";
                    btn.onclick = () => deleteStudent(c, i);
                    row.appendChild(btn);
                    
                    block.appendChild(row);
                });
                
                studentList.appendChild(block);
            }
            renderGradeSelectors();
            renderNoteSelectors();
            renderTeacherPage();
        }

        function deleteStudent(c, i) {
            let s = gruppi[c][i];
            delete giudizi[s];
            delete note[s];
            gruppi[c].splice(i, 1);
            saveAll();
            renderStudentList();
        }

        // Teachers management
        function renderTeacherPage() {
            console.log('renderTeacherPage called');
            console.log('users object:', users);
            
            let teacherGruppi = document.getElementById('teacherGruppi');
            if (!teacherGruppi) {
                console.error('teacherGruppi element not found');
                return;
            }
            teacherGruppi.innerHTML = "";
            
            for (const c in gruppi) {
                let label = document.createElement("label");
                let checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.id = "chk_" + c;
                checkbox.value = c;
                label.appendChild(checkbox);
                label.appendChild(document.createTextNode(" " + c));
                teacherGruppi.appendChild(label);
                teacherGruppi.appendChild(document.createElement("br"));
            }

            let teacherList = document.getElementById('teacherList');
            if (!teacherList) {
                console.error('teacherList element not found');
                return;
            }
            teacherList.innerHTML = "";
            
            console.log('Iterating through users...');
            let teacherCount = 0;
            for (const u in users) {
                console.log('User:', u, users[u]);
                if (users[u].role !== "teacher") continue;
                
                teacherCount++;
                let cl;
                if (users[u].gruppi === "ALL") {
                    cl = "Tutte";
                } else if (Array.isArray(users[u].gruppi)) {
                    cl = users[u].gruppi.join(", ");
                } else {
                    cl = "";
                }
                
                let pwd = users[u].password || "";
                let block = document.createElement("div");
                block.className = "class-block";
                
                let row = document.createElement("div");
                row.className = "row";
                row.innerHTML = `<div><strong>${escapeHtml(u)}</strong> (Password: ${escapeHtml(pwd)})<br><span class="teacher-gruppi">Gruppi: ${escapeHtml(cl) || "Nessuna"}</span></div>`;
                
                let btn = document.createElement("button");
                btn.className = "delete-btn";
                btn.textContent = "Elimina";
                btn.onclick = () => deleteTeacher(u);
                row.appendChild(btn);
                
                block.appendChild(row);
                teacherList.appendChild(block);
            }
            console.log('Total teachers found:', teacherCount);
        }

        function addTeacher() {
            let teacherUserEl = document.getElementById('teacherUser');
            let teacherPassEl = document.getElementById('teacherPass');
            let u = teacherUserEl.value.trim();
            let p = teacherPassEl.value.trim();
            if (!u || !p) return;
            if (users[u]) {
                alert("Esiste già");
                return;
            }
            
            let selectedGruppi = [];
            for (const c in gruppi) {
                let checkbox = document.getElementById("chk_" + c);
                if (checkbox && checkbox.checked) {
                    selectedGruppi.push(c);
                }
            }
            
            users[u] = {password: p, role: "teacher", gruppi: selectedGruppi};
            teacherUserEl.value = "";
            teacherPassEl.value = "";
            saveAll();
            renderTeacherPage();
        }

        function deleteTeacher(u) {
            if (u === "admin") return;
            delete users[u];
            saveAll();
            renderTeacherPage();
        }

        // Judgments management
        function renderGradeSelectors() {
            let gradeStudentSelect = document.getElementById('gradeStudentSelect');
            gradeStudentSelect.innerHTML = "";
            let vis = getVisibleGruppi();
            for (const c in vis) {
                // Aggiungi opzione per l'intero gruppo
                let gruppoOption = document.createElement("option");
                gruppoOption.textContent = "🎓 GRUPPO " + c + " (tutti)";
                gruppoOption.value = "GROUP:" + c;
                gruppoOption.className = "class-option";
                gradeStudentSelect.appendChild(gruppoOption);
                
                // Aggiungi studenti individuali
                vis[c].forEach(s => {
                    let option = document.createElement("option");
                    option.textContent = "  " + s + " (" + c + ")";
                    option.value = s;
                    gradeStudentSelect.appendChild(option);
                });
            }
            updateGradeInputs();
            renderGrades();
        }

        function updateGradeInputs() {
            let s = document.getElementById('gradeStudentSelect').value;
            let isGruppo = s && s.startsWith('GROUP:');
            let canEdit = s && !isGruppo && canEditStudent(s);
            
            document.getElementById('gradeValue').disabled = !canEdit;
            document.getElementById('gradeDate').disabled = !canEdit;
            document.getElementById('gradeType').disabled = !canEdit;
            document.querySelector('#gradesPage button[onclick="addGrade()"]').disabled = !canEdit;
        }

        function addGrade() {
            let s = document.getElementById('gradeStudentSelect').value;
            let gradeValueEl = document.getElementById('gradeValue');
            let gradeTypeEl = document.getElementById('gradeType');
            let v = gradeValueEl.value;
            let d = document.getElementById('gradeDate').value;
            let t = gradeTypeEl.value.trim();
            if (!s || !v || !d || !t) return;

            const allowedJudgments = ["A0", "A0+", "A1-", "A1", "A1+"];
            if (!allowedJudgments.includes(v)) return;
            
            if (!canEditStudent(s)) {
                alert("Non puoi inserire giudizi per questo studente");
                return;
            }
            
            giudizi[s] ??= [];
            giudizi[s].push({valore: v, data: d, tipologia: t, insertedBy: currentUser.username});
            gradeValueEl.value = "";
            gradeTypeEl.value = "";
            saveAll();
            renderGrades();
        }

        function deleteGrade(s, i) {
            if (!giudizi[s] || !giudizi[s][i]) return;
            
            let grade = giudizi[s][i];
            let canDelete = currentUser.role === "admin" || grade.insertedBy === currentUser.username;
            
            if (!canDelete) {
                alert("Non puoi eliminare questo giudizio");
                return;
            }
            
            giudizi[s].splice(i, 1);
            saveAll();
            renderGrades();
        }

        function renderGrades() {
            let gradeStudentSelect = document.getElementById('gradeStudentSelect');
            if (!gradeStudentSelect || !gradeStudentSelect.value) return;
            
            updateGradeInputs();
            
            let s = gradeStudentSelect.value;
            let gradeList = document.getElementById('gradeList');
            gradeList.innerHTML = "";
            
            // Check if viewing entire group
            if (s.startsWith('GROUP:')) {
                let gruppoName = s.substring(6);
                let vis = getVisibleGruppi();
                if (!vis[gruppoName]) return;
                
                vis[gruppoName].forEach(studentName => {
                    if (giudizi[studentName] && giudizi[studentName].length > 0) {
                        let studentBlock = document.createElement("div");
                        studentBlock.className = "class-block";
                        studentBlock.innerHTML = "<h4>" + escapeHtml(studentName) + "</h4>";
                        
                        giudizi[studentName].forEach((v, i) => {
                            let row = document.createElement("div");
                            row.className = "row";
                            let author = v.insertedBy ? " <span style='font-size:11px;color:#888'>(" + escapeHtml(v.insertedBy) + ")</span>" : "";
                            row.innerHTML = `<div>${escapeHtml(v.data)} — ${escapeHtml(v.tipologia)}: ${escapeHtml(v.valore)}${author}</div>`;
                            
                            let canDelete = currentUser.role === "admin" || v.insertedBy === currentUser.username;
                            if (canDelete) {
                                let btn = document.createElement("button");
                                btn.className = "delete-btn";
                                btn.textContent = "Elimina";
                                btn.onclick = () => {
                                    deleteGrade(studentName, i);
                                };
                                row.appendChild(btn);
                            }
                            
                            studentBlock.appendChild(row);
                        });
                        
                        gradeList.appendChild(studentBlock);
                    }
                });
                return;
            }
            
            // Single student view
            let allGiudizi = {};
            for (const student in giudizi) {
                allGiudizi[student] = giudizi[student];
            }
            
            (allGiudizi[s] || []).forEach((v, i) => {
                let row = document.createElement("div");
                row.className = "row";
                let author = v.insertedBy ? " <span style='font-size:11px;color:#888'>(" + escapeHtml(v.insertedBy) + ")</span>" : "";
                row.innerHTML = `<div>${escapeHtml(v.data)} — ${escapeHtml(v.tipologia)}: ${escapeHtml(v.valore)}${author}</div>`;
                
                let canDelete = currentUser.role === "admin" || v.insertedBy === currentUser.username;
                if (canDelete) {
                    let btn = document.createElement("button");
                    btn.className = "delete-btn";
                    btn.textContent = "Elimina";
                    btn.onclick = () => deleteGrade(s, i);
                    row.appendChild(btn);
                }
                
                gradeList.appendChild(row);
            });
        }

        // Notes management
        function renderNoteSelectors() {
            let noteStudentSelect = document.getElementById('noteStudentSelect');
            noteStudentSelect.innerHTML = "";
            let vis = getVisibleGruppi();
            for (const c in vis) {
                // Aggiungi opzione per l'intero gruppo
                let gruppoOption = document.createElement("option");
                gruppoOption.textContent = "🎓 GRUPPO " + c + " (tutti)";
                gruppoOption.value = "GROUP:" + c;
                gruppoOption.className = "class-option";
                noteStudentSelect.appendChild(gruppoOption);
                
                // Aggiungi studenti individuali
                vis[c].forEach(s => {
                    let option = document.createElement("option");
                    option.textContent = "  " + s + " (" + c + ")";
                    option.value = s;
                    noteStudentSelect.appendChild(option);
                });
            }
            updateNoteInputs();
            renderNotes();
        }

        function updateNoteInputs() {
            let s = document.getElementById('noteStudentSelect').value;
            let isGruppo = s && s.startsWith('GROUP:');
            let canEdit = s && !isGruppo && canEditStudent(s);
            
            document.getElementById('noteText').disabled = !canEdit;
            document.getElementById('noteDate').disabled = !canEdit;
            document.querySelector('#notesPage button[onclick="addNote()"]').disabled = !canEdit;
        }

        function addNote() {
            let s = document.getElementById('noteStudentSelect').value;
            let noteTextEl = document.getElementById('noteText');
            let t = noteTextEl.value.trim();
            let d = document.getElementById('noteDate').value;
            if (!s || !t || !d) return;
            
            if (!canEditStudent(s)) {
                alert("Non puoi inserire note per questo studente");
                return;
            }
            
            note[s] ??= [];
            note[s].push({testo: t, data: d, insertedBy: currentUser.username});
            noteTextEl.value = "";
            saveAll();
            renderNotes();
        }

        function deleteNote(s, i) {
            if (!note[s] || !note[s][i]) return;
            
            let n = note[s][i];
            let canDelete = currentUser.role === "admin" || n.insertedBy === currentUser.username;
            
            if (!canDelete) {
                alert("Non puoi eliminare questa nota");
                return;
            }
            
            note[s].splice(i, 1);
            saveAll();
            renderNotes();
        }

        function renderNotes() {
            let noteStudentSelect = document.getElementById('noteStudentSelect');
            if (!noteStudentSelect || !noteStudentSelect.value) return;
            
            updateNoteInputs();
            
            let s = noteStudentSelect.value;
            let noteList = document.getElementById('noteList');
            noteList.innerHTML = "";
            
            // Check if viewing entire group
            if (s.startsWith('GROUP:')) {
                let gruppoName = s.substring(6);
                let vis = getVisibleGruppi();
                if (!vis[gruppoName]) return;
                
                vis[gruppoName].forEach(studentName => {
                    if (note[studentName] && note[studentName].length > 0) {
                        let studentBlock = document.createElement("div");
                        studentBlock.className = "class-block";
                        studentBlock.innerHTML = "<h4>" + escapeHtml(studentName) + "</h4>";
                        
                        note[studentName].forEach((n, i) => {
                            let row = document.createElement("div");
                            row.className = "row";
                            let author = n.insertedBy ? " <span style='font-size:11px;color:#888'>(" + escapeHtml(n.insertedBy) + ")</span>" : "";
                            row.innerHTML = `<div>${escapeHtml(n.data)} — ${escapeHtml(n.testo)}${author}</div>`;
                            
                            let canDelete = currentUser.role === "admin" || n.insertedBy === currentUser.username;
                            if (canDelete) {
                                let btn = document.createElement("button");
                                btn.className = "delete-btn";
                                btn.textContent = "Elimina";
                                btn.onclick = () => {
                                    deleteNote(studentName, i);
                                };
                                row.appendChild(btn);
                            }
                            
                            studentBlock.appendChild(row);
                        });
                        
                        noteList.appendChild(studentBlock);
                    }
                });
                return;
            }
            
            // Single student view
            let allNote = {};
            for (const student in note) {
                allNote[student] = note[student];
            }
            
            (allNote[s] || []).forEach((n, i) => {
                let row = document.createElement("div");
                row.className = "row";
                let author = n.insertedBy ? " <span style='font-size:11px;color:#888'>(" + escapeHtml(n.insertedBy) + ")</span>" : "";
                row.innerHTML = `<div>${escapeHtml(n.data)} — ${escapeHtml(n.testo)}${author}</div>`;
                
                let canDelete = currentUser.role === "admin" || n.insertedBy === currentUser.username;
                if (canDelete) {
                    let btn = document.createElement("button");
                    btn.className = "delete-btn";
                    btn.textContent = "Elimina";
                    btn.onclick = () => deleteNote(s, i);
                    row.appendChild(btn);
                }
                
                noteList.appendChild(row);
            });
        }



        // History page for attendance
        function showHistoryPage() {
            document.querySelectorAll(".card").forEach(e => e.classList.add("hidden"));
            document.getElementById('historyPage').classList.remove("hidden");
            
            // Initialize to current month if not set
            let historyMonth = document.getElementById('historyMonth');
            if (!historyMonth.value) {
                let today = new Date();
                historyMonth.value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
            }
            
            renderHistory();
        }

        function changeHistoryMonth(offset) {
            let monthEl = document.getElementById('historyMonth');
            let [year, month] = monthEl.value.split('-').map(Number);
            let date = new Date(year, month - 1 + offset, 1);
            monthEl.value = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
            renderHistory();
        }

        function renderHistory() {
            let historyContainer = document.getElementById('historyContainer');
            historyContainer.innerHTML = "";
            
            let monthEl = document.getElementById('historyMonth');
            if (!monthEl || !monthEl.value) return;
            
            let [year, month] = monthEl.value.split('-').map(Number);
            let firstDay = new Date(year, month - 1, 1);
            let lastDay = new Date(year, month, 0);
            let daysInMonth = lastDay.getDate();
            
            // Generate all dates in the month
            let allDates = [];
            for (let day = 1; day <= daysInMonth; day++) {
                let date = new Date(year, month - 1, day);
                let dateStr = date.getFullYear() + '-' + 
                             String(date.getMonth() + 1).padStart(2, '0') + '-' + 
                             String(date.getDate()).padStart(2, '0');
                allDates.push(dateStr);
            }
            
            let vis = getVisibleGruppi();
            
            for (const c in vis) {
                let gruppoBlock = document.createElement("div");
                gruppoBlock.className = "class-block";
                gruppoBlock.innerHTML = "<h3>Gruppo " + escapeHtml(c) + "</h3>";
                
                // Create table
                let tableDiv = document.createElement("div");
                tableDiv.className = "history-table";
                
                let table = document.createElement("table");
                
                // Header row
                let thead = document.createElement("thead");
                let headerRow = document.createElement("tr");
                let th = document.createElement("th");
                th.textContent = "Studente";
                headerRow.appendChild(th);
                
                allDates.forEach(date => {
                    let th = document.createElement("th");
                    let day = parseInt(date.substring(8));
                    th.textContent = day;
                    th.title = date;
                    headerRow.appendChild(th);
                });
                
                thead.appendChild(headerRow);
                table.appendChild(thead);
                
                // Body rows
                let tbody = document.createElement("tbody");
                vis[c].forEach(s => {
                    let row = document.createElement("tr");
                    
                    let nameCell = document.createElement("td");
                    nameCell.textContent = s;
                    row.appendChild(nameCell);
                    
                    allDates.forEach(date => {
                        let cell = document.createElement("td");
                        let data = presenze[c]?.[s]?.[date];
                        let value = "";
                        
                        if (data) {
                            if (typeof data === 'string') {
                                value = data;
                            } else {
                                value = data.valore || "";
                            }
                        }
                        
                        if (value === "Presente") {
                            cell.innerHTML = '<span class="dot-present" title="Presente"></span>';
                        } else if (value === "Assente Giustificato") {
                            cell.innerHTML = '<span class="dot-absent-justified" title="Assente Giustificato"></span>';
                        } else if (value === "Assente Ingiustificato") {
                            cell.innerHTML = '<span class="dot-absent-unjustified" title="Assente Ingiustificato"></span>';
                        } else {
                            cell.textContent = "-";
                        }
                        
                        row.appendChild(cell);
                    });
                    
                    tbody.appendChild(row);
                });
                
                table.appendChild(tbody);
                tableDiv.appendChild(table);
                gruppoBlock.appendChild(tableDiv);
                historyContainer.appendChild(gruppoBlock);
            }
        }

        // Initialize dates
        function initializeDates() {
            try {
                let today = new Date().toISOString().split("T")[0];
                let dateEl = document.getElementById('date');
                let gradeDateEl = document.getElementById('gradeDate');
                let noteDateEl = document.getElementById('noteDate');
                
                if (dateEl) dateEl.value = today;
                if (gradeDateEl) gradeDateEl.value = today;
                if (noteDateEl) noteDateEl.value = today;
                
                console.log('Dates initialized to:', today);
            } catch(error) {
                console.error('Error initializing dates:', error);
            }
        }
        
        // Call on page load
        window.addEventListener('DOMContentLoaded', function() {
            console.log('DOM Content Loaded');
            initializeDates();
        });
    </script>
